<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">

<!-- api key -- 045630fb97d77d8c760732c640dfa30f -->
</head>
<body>
    <section class="container">
        <div class="weather_header">
            <form class="weather_search">
                <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text"
            class="city_name"
            placeholder="search your city">
            </form>
        </div>
        <!-------------- weather main body -------------------------------->
        <div class="weather_body container" >
            <h1 class="weather_city"></h1>
              <img class="country_flag">
               <p class="weather_data_time"></p> 
                <div class="weather_data">
                    <p class="weather_forecast"></p>
                    <div class="weather_icon"></div>
                </div>
               
                <p class="weather_temperature"></p>
            <div class="weather_minmax">
                <p class="weather_min"></p>
                <p class="weather_max"></p>
            </div>

        </div>

        <!--------------- weather extra data -------------------->

        <section class="weather_info ">
            <div class="weather_card">
                <i class="fa-solid fa-droplet"></i>
              <div> 
                <p> Feels Like</p>
                <p class="weather_feelsLike"> 15&#176</p>
              </div>
            </div>

             <div class="weather_card">
                <i class="fa-solid fa-droplet"></i>
              <div> 
                <p> Humidity</p>
                <p class="weather_humidity"> 15&#176</p>
              </div>
            </div>

             <div class="weather_card">
                <i class="fa-solid fa-wind"></i>
              <div> 
                <p> wind</p>
                <p class="weather_wind"> 15&#176</p>
              </div>
            </div>

            <div class="weather_card">
                <i class="fa-solid fa-wind"></i>
              <div> 
                <p> Pressure</p>
                <p class="weather_pressure"> 15&#176</p>
              </div>
            </div>
            <div class="weather_card">
    <i class="fa-solid fa-sun"></i>
    <div>
        <p>Sunrise</p>
        <p class="weather_sunrise"></p>
    </div>
</div>

<div class="weather_card">
    <i class="fa-solid fa-moon"></i>
    <div>
        <p>Sunset</p>
        <p class="weather_sunset"></p>
    </div>
</div>
        </section>
    </section>

    <script src="index.js " > </script>
</body>
</html>
